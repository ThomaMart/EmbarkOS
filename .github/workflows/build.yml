name: Build EmbarkOS

on:
  push:
    branches:
      - main
      - master

  pull_request:

  workflow_dispatch:

jobs:

  build-qemu:

    name: Build QEMU

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            cpio \
            rsync \
            unzip \
            wget \
            file \
            git \
            python3 \
            python3-pip \
            libssl-dev

      - name: Build QEMU image
        run: |
          chmod +x scripts/build-qemu.sh
          ./scripts/build-qemu.sh

      - name: Upload QEMU artifacts
        uses: actions/upload-artifact@v4
        with:
          name: embarkos-qemu
          path: |
            output/qemu/images/Image
            output/qemu/images/rootfs.ext2
            output/qemu/images/rootfs.ext4

  build-rpi3:

    name: Build Raspberry Pi 3

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            cpio \
            rsync \
            unzip \
            wget \
            file \
            git \
            python3 \
            python3-pip \
            libssl-dev

      - name: Build Raspberry Pi image
        run: |
          chmod +x scripts/build-rpi.sh
          ./scripts/build-rpi.sh

      - name: Upload Raspberry Pi artifacts
        uses: actions/upload-artifact@v4
        with:
          name: embarkos-rpi3
          path: |
            output/rpi3/images/Image
            output/rpi3/images/boot.vfat
            output/rpi3/images/rootfs.ext2
            output/rpi3/images/rootfs.ext4
            output/rpi3/images/sdcard.img